version: '3.8'

services:
  resume-analyzer:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/home/user/app/data
    environment:
      - PORT=8000
      - ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
