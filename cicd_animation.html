<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Animation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        body {
            background-color: #0f172a; /* Dark sleek background */
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.05), transparent 25%);
        }

        .title {
            text-align: center;
            margin-bottom: 80px;
        }

        .title h1 {
            font-size: 3rem;
            margin: 0;
            background: -webkit-linear-gradient(45deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .title p {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .pipeline-container {
            width: 85%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .track {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 4px;
            background: #1e293b;
            z-index: 1;
            transform: translateY(-50%);
            border-radius: 2px;
        }

        .node {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            z-index: 2;
            width: 160px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
        }

        .node h3 { 
            margin: 0 0 8px 0; 
            font-size: 1.3rem; 
            font-weight: 600;
        }
        
        .node p { 
            margin: 0; 
            font-size: 0.9rem; 
            color: #cbd5e1; 
        }

        .node-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            display: block;
        }

        /* The moving packet (code/image) */
        .packet {
            position: absolute;
            top: 50%;
            left: 0;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            animation: travel 8s infinite linear;
        }

        /* Pulse Animations for Nodes when packet arrives */
        @keyframes pulse1 { 0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.1); } 10% { box-shadow: 0 0 30px #38bdf8; border-color: #38bdf8; transform: scale(1.05); } }
        @keyframes pulse2 { 0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.1); } 40% { box-shadow: 0 0 30px #a855f7; border-color: #a855f7; transform: scale(1.05); } }
        @keyframes pulse3 { 0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.1); } 70% { box-shadow: 0 0 30px #f59e0b; border-color: #f59e0b; transform: scale(1.05); } }
        @keyframes pulse4 { 0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.1); } 90% { box-shadow: 0 0 30px #10b981; border-color: #10b981; transform: scale(1.05); } }

        /* Packet Travel Animation */
        @keyframes travel {
            0% { left: 5%; background: #38bdf8; box-shadow: 0 0 15px #38bdf8, 0 0 30px #38bdf8; }
            10% { left: 5%; background: #38bdf8; box-shadow: 0 0 15px #38bdf8, 0 0 30px #38bdf8; }
            30% { left: 35%; background: #a855f7; box-shadow: 0 0 15px #a855f7, 0 0 30px #a855f7; }
            40% { left: 35%; background: #a855f7; box-shadow: 0 0 15px #a855f7, 0 0 30px #a855f7; }
            60% { left: 65%; background: #f59e0b; box-shadow: 0 0 15px #f59e0b, 0 0 30px #f59e0b; }
            70% { left: 65%; background: #f59e0b; box-shadow: 0 0 15px #f59e0b, 0 0 30px #f59e0b; }
            85% { left: 95%; background: #10b981; box-shadow: 0 0 15px #10b981, 0 0 30px #10b981; }
            100% { left: 95%; background: #10b981; box-shadow: 0 0 15px #10b981, 0 0 30px #10b981; opacity: 0; }
        }

        #n1 { animation: pulse1 8s infinite linear; }
        #n2 { animation: pulse2 8s infinite linear; }
        #n3 { animation: pulse3 8s infinite linear; }
        #n4 { animation: pulse4 8s infinite linear; }

    </style>
</head>
<body>

    <div class="title">
        <h1>CI/CD Pipeline</h1>
        <p>Zero-Downtime Serverless Deployment</p>
    </div>

    <div class="pipeline-container">
        <div class="track"></div>
        <div class="packet"></div>

        <div class="node" id="n1">
            <span class="node-icon">💻</span>
            <h3>Developer</h3>
            <p>git push main</p>
        </div>

        <div class="node" id="n2">
            <span class="node-icon">⚙️</span>
            <h3>GitHub Actions</h3>
            <p>Build Docker Image</p>
        </div>

        <div class="node" id="n3">
            <span class="node-icon">📦</span>
            <h3>Azure ACR</h3>
            <p>Store Image Safely</p>
        </div>

        <div class="node" id="n4">
            <span class="node-icon">🚀</span>
            <h3>Azure App</h3>
            <p>Live Website</p>
        </div>
    </div>

</body>
</html>
