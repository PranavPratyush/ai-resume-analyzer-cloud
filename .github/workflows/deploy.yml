name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE: resume-analyzer
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/resume-analyzer

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r App/requirements.txt

      - name: Run basic import test
        run: |
          python -c "import streamlit; print('Streamlit imported successfully! OK')"

      - name: Check Python syntax for App.py
        run: |
          python -m py_compile App/App.py
          echo "App.py syntax is valid!"

  build-and-deploy:
    name: Build and Deploy to Cloud Run
    needs: test
    # Only run this job if the event that triggered the workflow was a push to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker to use gcloud as a credential helper
        run: |
          gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:latest
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=2Gi
            --cpu=2
            --max-instances=3
            --timeout=300
          env_vars: |
            ENVIRONMENT=production

      - name: Show deployed URL
        run: |
          echo "Deployment successful!"
          echo "Your application is live at: ${{ steps.deploy.outputs.url }}"
