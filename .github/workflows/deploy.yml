name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r App/requirements.txt

      - name: Run basic import test
        run: |
          python -c "import streamlit; print('Streamlit imported successfully! OK')"

      - name: Check Python syntax for App.py
        run: |
          python -m py_compile App/App.py
          echo "App.py syntax is valid!"

  sync-to-hub:
    name: Sync to Hugging Face Hub
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add space https://00pranav00:$HF_TOKEN@huggingface.co/spaces/00pranav00/resume-analyze
          git push --force space main

